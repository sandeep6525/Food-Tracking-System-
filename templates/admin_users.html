{% extends 'base.html' %}
{% block content %}
<h5>Users</h5>
<form method="post" class="row g-3 mb-3">
  <div class="col-md-4"><label class="form-label">Email</label><input name="email" class="form-control" required></div>
  <div class="col-md-3"><label class="form-label">Role</label>
    <select name="role" class="form-select"><option>user</option><option>admin</option></select></div>
  <div class="col-md-3"><label class="form-label">Password</label><input type="password" name="password" class="form-control" required></div>
  <div class="col-md-2 d-flex align-items-end"><button class="btn btn-danger w-100">Add</button></div>
</form>
<table class="table table-sm">
  <thead><tr><th>ID</th><th>Email</th><th>Role</th></tr></thead>
  <tbody>
    {% for u in users %}
    <tr><td>{{ u.id }}</td><td>{{ u.email }}</td><td>{{ u.role }}</td></tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
