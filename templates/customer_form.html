{% extends 'base.html' %}
{% block content %}
<h5>New Customer</h5>
<form method="post" class="row g-3">
  <div class="col-md-6"><label class="form-label">Name</label><input name="name" class="form-control" required></div>
  <div class="col-md-6"><label class="form-label">Contact</label><input name="contact" class="form-control"></div>
  <div class="col-md-12"><label class="form-label">Address</label><input name="address" class="form-control"></div>
  <div class="col-md-12"><label class="form-label">Notes</label><textarea name="notes" class="form-control"></textarea></div>
  <div class="col-12"><button class="btn btn-danger">Save</button></div>
</form>
{% endblock %}
